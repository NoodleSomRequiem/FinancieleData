<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Financiële spoofdata 2026</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f5f7fb;color:#1f2937;margin:0}
    header{background:#0f172a;color:#fff;padding:32px}
    main{padding:24px}
    section{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;margin-bottom:24px}
    h1,h2{margin-top:0}
    .table-wrap{overflow:auto}
    table{border-collapse:collapse;width:100%;min-width:760px}
    thead th{background:#e2e8f0;text-align:left;padding:12px;border-bottom:1px solid #cbd5e1}
    tbody td{padding:10px 12px;border-bottom:1px solid #eef2f7}
    tbody tr:nth-child(even){background:#f8fafc}
    td.amount{text-align:right}
    td.negative{color:#b91c1c;font-weight:600}
  </style>
</head>
<body>
<header>
  <h1>Financiële spoofdata 2026</h1>
  <p>Duidelijke HTML-tabellen voor Copilot Studio</p>
</header>

<main>
  <section>
    <h2>Omzet</h2>
    <div class="table-wrap">
      <table>
        <thead>
        <tr>
          <th>Datum</th>
          <th>Omschrijving</th>
          <th>Bedrag</th>
        </tr>
        </thead>
        <tbody>
        <tr>
          <td>01-01-2026</td>
          <td>Omzet jan weekhelft 1</td>
          <td class="amount">€ 69.083,11</td>
        </tr>
        <tr>
          <td>04-01-2026</td>
          <td>Omzet jan weekhelft 2</td>
          <td class="amount">€ 63.791,74</td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
</body>
</html>
